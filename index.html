<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape de Flechas 🌊</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
}

/* FONDO MAR */
.game {
  width:100%;
  height:100vh;
  position:relative;
  background: linear-gradient(#0ea5e9, #022c43);
}

/* INTERFAZ */
.ui {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  z-index:10;
}

.ui h1 {
  margin:0;
}

#score {
  font-size:20px;
}

/* JUGADOR */
#player {
  width:60px;
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

/* FLECHAS */
.arrow {
  width:40px;
  height:40px;
  position:absolute;
  top:0;
}
</style>

</head>
<body>

<div class="game" id="game">

  <div class="ui">
    <h1>🌊 ESCAPA DE LAS FLECHAS</h1>
    <div id="score">Puntaje: 0</div>
  </div>

  <img id="player" src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png">

</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const scoreText = document.getElementById("score");

let x = window.innerWidth / 2;
let speed = 15;
let score = 0;
let jugando = true;

let arrows = [];

// MOVIMIENTO
document.addEventListener("keydown", (e) => {

  if (!jugando) return;

  if (e.key === "a" || e.key === "ArrowLeft") {
    x -= speed;
  }

  if (e.key === "d" || e.key === "ArrowRight") {
    x += speed;
  }

  x = Math.max(0, Math.min(window.innerWidth - 60, x));
  player.style.left = x + "px";
});

// CREAR FLECHAS
function crearFlecha() {
  if (!jugando) return;

  const arrow = document.createElement("img");
  arrow.src = "https://cdn-icons-png.flaticon.com/512/545/545682.png";
  arrow.classList.add("arrow");

  let ax = Math.random() * (window.innerWidth - 40);
  let ay = 0;

  arrow.style.left = ax + "px";
  arrow.style.top = ay + "px";

  game.appendChild(arrow);
  arrows.push(arrow);

  let caer = setInterval(() => {

    if (!jugando) return;

    ay += 8;
    arrow.style.top = ay + "px";

    // COLISION
    if (colision(arrow, player)) {
      gameOver();
    }

    // SUMAR PUNTOS SI PASA
    if (ay > window.innerHeight) {
      score++;
      scoreText.innerText = "Puntaje: " + score;
      arrow.remove();
      clearInterval(caer);
    }

  }, 30);
}

// COLISION
function colision(a, b) {
  const r1 = a.getBoundingClientRect();
  const r2 = b.getBoundingClientRect();

  return !(
    r1.top > r2.bottom ||
    r1.bottom < r2.top ||
    r1.right < r2.left ||
    r1.left > r2.right
  );
}

// GAME OVER
function gameOver() {
  jugando = false;
  alert("💀 PERDISTE - Puntaje: " + score);
  location.reload();
}

// GENERAR FLECHAS CONSTANTE
setInterval(crearFlecha, 800);
</script>

</body>
</html>
