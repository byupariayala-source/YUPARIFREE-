<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Free Fire Web</title>

<style>
body {
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
}

/* BARRA */
.topbar {
  text-align:center;
  padding:10px;
  background:black;
}

/* VIDA */
#vida {
  color:red;
  font-size:18px;
}

/* MAPA */
.game-area {
  width:100%;
  height:90vh;
  position:relative;
  background:linear-gradient(#111, #222);
  overflow:hidden;
}

/* JUGADOR */
#player {
  width:80px;
  position:absolute;
  top:200px;
  left:200px;
}

/* BALAS */
.bullet {
  width:10px;
  height:10px;
  background:yellow;
  position:absolute;
  border-radius:50%;
}

/* ENEMIGOS */
.enemy {
  width:50px;
  height:50px;
  background:red;
  position:absolute;
  border-radius:50%;
}

/* GAME OVER */
#gameOver {
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  display:none;
}

#gameOver button {
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}
</style>

</head>
<body>

</div>

</div>
