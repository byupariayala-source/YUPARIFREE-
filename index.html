<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Free Fire Lobby</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">FREE FIRE</div>
  <div class="money">💰 <span id="coins">500</span> | 💎 <span id="diamonds">10</span></div>
</div>

<div class="container">

  <!-- MENU -->
  <div class="sidebar">
    <button onclick="cambiarSeccion('tienda')">🛒 TIENDA</button>
    <button onclick="cambiarSeccion('personajes')">👤 PERSONAJES</button>
    <button onclick="cambiarSeccion('armas')">🔫 ARMAS</button>
  </div>

  <!-- CENTRO -->
  <div class="main">
    <img id="character" src="https://i.imgur.com/8QZ8FQv.png">
    <h2 id="texto">Bienvenido</h2>
    <button class="start" onclick="iniciarJuego()">INICIAR</button>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right">
    <h3>RECOMPENSAS</h3>
    <button onclick="ganarRecompensa()">🎁 Obtener</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
